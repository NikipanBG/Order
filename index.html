<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АВТОЗОНА 33</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .login-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .login-btn:hover {
            background: white;
            color: #667eea;
        }
        
        .main-content {
            padding: 30px;
        }
        
        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .tool-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .tool-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .tool-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .tool-btn.secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .tool-btn.secondary:hover {
            background: #e0e0e0;
        }
        
        .tool-btn.active {
            background: #667eea;
            color: white;
        }
        
        .status-badge {
            background: #4CAF50;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            padding-left: 45px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #999;
        }
        
        .filters {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .filter-group label {
            font-weight: bold;
            color: #555;
            min-width: 60px;
        }
        
        .filter-select {
            padding: 10px 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            min-width: 180px;
            background: white;
            cursor: pointer;
        }
        
        .filter-select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .filter-select option:disabled {
            color: #999;
            font-style: italic;
        }
        
        .hide-zero-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            border-radius: 10px;
            background: white;
            color: #667eea;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .hide-zero-btn.active {
            background: #667eea;
            color: white;
        }
        
        .selected-count {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-left: auto;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            max-height: 600px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .product-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-color: #667eea;
        }
        
        .product-card.selected {
            border: 2px solid #667eea;
            background: #f0f4ff;
        }
        
        .product-card.out-of-stock {
            opacity: 0.6;
            background: #f5f5f5;
        }
        
        .product-brand {
            color: #667eea;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .product-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
            padding-right: 50px;
        }
        
        .product-group {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .product-stock {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #e3f2fd;
            color: #1976d2;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .product-stock.low {
            background: #ffebee;
            color: #c62828;
        }
        
        .product-stock.medium {
            background: #fff3e0;
            color: #ef6c00;
        }
        
        .product-stock.high {
            background: #e8f5e8;
            color: #2e7d32;
        }
        
        .product-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }
        
        .add-btn {
            background: #4CAF50;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .add-btn:hover {
            background: #45a049;
            transform: scale(1.1);
        }
        
        .add-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .no-products {
            grid-column: 1/-1;
            text-align: center;
            padding: 50px;
            color: #666;
            font-size: 16px;
        }
        
        .cart-panel {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
        }
        
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .cart-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        
        .cart-count {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 16px;
        }
        
        .cart-items {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        
        .cart-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .cart-item-info {
            flex: 1;
            min-width: 200px;
        }
        
        .cart-item-info h4 {
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .cart-item-info p {
            color: #666;
            font-size: 14px;
        }
        
        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .quantity-input {
            width: 70px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }
        
        .quantity-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .quantity-btn {
            background: #f0f0f0;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .quantity-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .quantity-btn:disabled {
            background: #f0f0f0;
            color: #ccc;
            cursor: not-allowed;
        }
        
        .remove-btn {
            background: #ff4444;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .remove-btn:hover {
            background: #cc0000;
            transform: scale(1.1);
        }
        
        .stock-warning {
            color: #c62828;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .cart-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 2px solid #ddd;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .cart-total {
            font-size: 18px;
            font-weight: bold;
        }
        
        .cart-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .history-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .history-item:hover {
            background: #f0f0f0;
        }
        
        .history-date {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .history-summary {
            display: flex;
            justify-content: space-between;
            color: #666;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 50px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .stats-bar {
            background: #f0f4ff;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
            font-size: 14px;
        }
        
        .stats-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stats-label {
            color: #666;
        }
        
        .stats-value {
            font-weight: bold;
            color: #667eea;
        }
        
        @media (max-width: 768px) {
            .toolbar {
                flex-direction: column;
            }
            
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-group {
                flex-direction: column;
                align-items: stretch;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .cart-footer {
                flex-direction: column;
                align-items: stretch;
            }
            
            .cart-actions {
                justify-content: center;
            }
            
            .cart-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .cart-item-actions {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">АВТОЗОНА 33</div>
            <button class="login-btn" onclick="toggleLogin()">👤 ВЛИЗАНЕ</button>
        </div>
        
        <div class="main-content">
            <div class="toolbar">
                <button class="tool-btn primary" onclick="loadProductsFromGoogleSheets()">
                    🔄 ОБНОВИ
                </button>
                <div class="status-badge" id="statusBadge">
                    ✓ Синхронизирано
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Търсене по марка, модел или група..." oninput="handleSearch()">
                </div>
                <button class="tool-btn secondary" onclick="showCartModal()">
                    📋 ПРЕГЛЕД НА ЗАЯВКАТА (<span id="cartCount">0</span>)
                </button>
                <button class="tool-btn secondary" onclick="showHistoryModal()">
                    📜 ИСТОРИЯ
                </button>
            </div>
            
            <div class="filters">
                <div class="filter-group">
                    <label>Група:</label>
                    <select class="filter-select" id="groupFilter" onchange="filterProducts()">
                        <option value="all">Всички групи</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Марка:</label>
                    <select class="filter-select" id="brandFilter" onchange="filterProducts()">
                        <option value="all">Всички марки</option>
                    </select>
                </div>
                <button class="hide-zero-btn" id="hideZeroBtn" onclick="toggleHideZero()">
                    <span>👁️</span> Скрий нулевите
                </button>
                <div class="selected-count" id="selectedCount">
                    0 избрани
                </div>
            </div>
            
            <div class="stats-bar" id="statsBar">
                <div class="stats-item">
                    <span class="stats-label">Общо продукти:</span>
                    <span class="stats-value" id="totalProducts">0</span>
                </div>
                <div class="stats-item">
                    <span class="stats-label">Показани:</span>
                    <span class="stats-value" id="shownProducts">0</span>
                </div>
                <div class="stats-item">
                    <span class="stats-label">Налични:</span>
                    <span class="stats-value" id="inStockProducts">0</span>
                </div>
            </div>
            
            <div class="loading" id="loadingSpinner">
                <div class="spinner"></div>
                <p>Зареждане на продуктите...</p>
            </div>
            
            <div class="products-grid" id="productsGrid"></div>
            
            <div class="cart-panel">
                <div class="cart-header">
                    <div>
                        <span class="cart-title">КОЛИЧКА</span>
                        <span class="cart-count" id="cartPanelCount">0 бр.</span>
                    </div>
                    <div>
                        <button class="tool-btn secondary" onclick="clearCart()">🗑️ ИЗЧИСТИ</button>
                    </div>
                </div>
                
                <div class="cart-items" id="cartItems"></div>
                
                <div class="cart-footer">
                    <div class="cart-total" id="cartTotal">Общо: 0 бр.</div>
                    <div class="cart-actions">
                        <button class="tool-btn primary" onclick="printCart()">🖨️ ПЕЧАТ</button>
                        <button class="tool-btn primary" onclick="emailCart()">📧 ИМЕЙЛ</button>
                        <button class="tool-btn primary" onclick="viberCart()">💬 VIBER</button>
                        <button class="tool-btn primary" onclick="exportCart()">📊 EXCEL</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="cartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📋 ЗАЯВКА - АВТОЗОНА 33</h2>
                <button class="modal-close" onclick="closeCartModal()">&times;</button>
            </div>
            <div id="modalCartItems"></div>
            <div class="cart-footer">
                <div class="cart-total" id="modalCartTotal">Общо: 0 бр.</div>
                <div class="cart-actions">
                    <button class="tool-btn primary" onclick="printCart()">🖨️ ПЕЧАТ / PDF</button>
                    <button class="tool-btn primary" onclick="emailCart()">📧 ИМЕЙЛ</button>
                    <button class="tool-btn primary" onclick="viberCart()">💬 VIBER</button>
                    <button class="tool-btn primary" onclick="exportCart()">📊 ЕКСПОРТ В EXCEL</button>
                    <button class="tool-btn secondary" onclick="clearCart()">🗑️ ИЗЧИСТИ КОЛИЧКАТА</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="historyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📜 История на заявките</h2>
                <button class="modal-close" onclick="closeHistoryModal()">&times;</button>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        // ==================== КОНФИГУРАЦИЯ ====================
        const GOOGLE_SHEETS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRT-vUn0NhIFZHcJ0lLPcG8EdzIbdRPxQ5UPUSufkdvih5TiIrk7GHsdOZhF3Ne2l1n4zmBYa7nSf6c/pub?output=csv';
        
        // ==================== ГЛОБАЛНИ ПРОМЕНЛИВИ ====================
        let allProducts = [];
        let filteredProducts = [];
        let cart = [];
        let selectedProducts = new Set();
        let orders = JSON.parse(localStorage.getItem('orders') || '[]');
        let hideZeroStock = false;
        let searchTerm = '';
        
        // ==================== ОСНОВНА ФУНКЦИЯ ЗА ЗАРЕЖДАНЕ ====================
        function loadProductsFromGoogleSheets() {
            showLoading(true);
            updateStatus('⏳ Зареждане...');
            
            const url = GOOGLE_SHEETS_URL + '&nocache=' + new Date().getTime();
            console.log('Зареждане от:', url);
            
            fetch(url, { 
                mode: 'cors',
                cache: 'no-store',
                headers: {
                    'Accept': 'text/csv'
                }
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP грешка ${response.status}`);
                    }
                    return response.text();
                })
                .then(csvData => {
                    if (csvData.trim().startsWith('<!DOCTYPE')) {
                        throw new Error('Получен е HTML вместо CSV - грешен URL');
                    }
                    
                    allProducts = parseCSV(csvData);
                    
                    if (allProducts.length === 0) {
                        throw new Error('Няма данни в таблицата');
                    }
                    
                    initializeFilters();
                    filterProducts();
                    updateStatus('✓ Синхронизирано');
                    showLoading(false);
                })
                .catch(error => {
                    console.error('Грешка:', error);
                    updateStatus('⚠ ' + error.message);
                    showLoading(false);
                    loadSampleData();
                });
        }
        
        // ==================== ФУНКЦИИ ЗА ПАРСВАНЕ ====================
        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            if (lines.length < 2) return [];
            
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            const products = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim() === '') continue;
                
                const values = parseCSVLine(lines[i]);
                if (values.length !== headers.length) continue;
                
                const product = {};
                for (let j = 0; j < headers.length; j++) {
                    product[headers[j]] = values[j] ? values[j].replace(/"/g, '').trim() : '';
                }
                
                const parsedProduct = {
                    id: i,
                    brand: product['Марка'] || product['Brand'] || product['brand'] || 'Няма марка',
                    model: product['Модел'] || product['Model'] || product['model'] || 'Без модел',
                    group: product['Група'] || product['Group'] || product['group'] || 'Общи',
                    stock: parseInt(product['Наличност'] || product['Stock'] || product['stock'] || '0'),
                    code: product['Код'] || product['Code'] || product['code'] || `PRD${i}`,
                    description: product['Описание'] || product['Description'] || product['description'] || ''
                };
                
                if (isNaN(parsedProduct.stock)) parsedProduct.stock = 0;
                
                products.push(parsedProduct);
            }
            
            return products;
        }
        
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            
            result.push(current);
            return result;
        }
        
        // ==================== ФУНКЦИИ ЗА ФИЛТРИРАНЕ ====================
        function initializeFilters() {
            updateSmartFilters();
        }
        
        function updateSmartFilters() {
            // Вземаме само продуктите, които отговарят на текущите условия
            let baseProducts = allProducts;
            
            // Прилагаме търсене за умните филтри
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                baseProducts = allProducts.filter(p => 
                    p.brand.toLowerCase().includes(term) ||
                    p.model.toLowerCase().includes(term) ||
                    p.group.toLowerCase().includes(term) ||
                    p.code.toLowerCase().includes(term)
                );
            }
            
            // Вземаме уникални групи и марки само от релевантните продукти
            const groups = [...new Set(baseProducts.map(p => p.group))].sort();
            const brands = [...new Set(baseProducts.map(p => p.brand))].sort();
            
            const groupSelect = document.getElementById('groupFilter');
            const brandSelect = document.getElementById('brandFilter');
            
            const currentGroup = groupSelect.value;
            const currentBrand = brandSelect.value;
            
            // Обновяваме групите
            groupSelect.innerHTML = '<option value="all">Всички групи</option>' + 
                groups.map(g => `<option value="${g}" ${g === currentGroup ? 'selected' : ''}>${g}</option>`).join('');
            
            // За марките, ако има избрана група, показваме само марки от тази група
            let relevantBrands = brands;
            if (currentGroup !== 'all') {
                const productsInGroup = baseProducts.filter(p => p.group === currentGroup);
                relevantBrands = [...new Set(productsInGroup.map(p => p.brand))].sort();
            }
            
            brandSelect.innerHTML = '<option value="all">Всички марки</option>' + 
                relevantBrands.map(b => `<option value="${b}" ${b === currentBrand ? 'selected' : ''}>${b}</option>`).join('');
        }
        
        function filterProducts() {
            const group = document.getElementById('groupFilter').value;
            const brand = document.getElementById('brandFilter').value;
            
            // Започваме с всички продукти
            let filtered = allProducts;
            
            // Прилагаме търсене
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(p => 
                    p.brand.toLowerCase().includes(term) ||
                    p.model.toLowerCase().includes(term) ||
                    p.group.toLowerCase().includes(term) ||
                    p.code.toLowerCase().includes(term)
                );
            }
            
            // Прилагаме груп филтър
            if (group !== 'all') {
                filtered = filtered.filter(p => p.group === group);
            }
            
            // Прилагаме бранд филтър
            if (brand !== 'all') {
                filtered = filtered.filter(p => p.brand === brand);
            }
            
            // Прилагаме скриване на нулевите
            if (hideZeroStock) {
                filtered = filtered.filter(p => p.stock > 0);
            }
            
            filteredProducts = filtered;
            
            // Обновяваме умните филтри (но без да ги прилагаме рекурсивно)
            updateSmartFilters();
            
            renderProducts();
            updateStats();
        }
        
        function handleSearch() {
            searchTerm = document.getElementById('searchInput').value;
            filterProducts();
        }
        
        function toggleHideZero() {
            hideZeroStock = !hideZeroStock;
            const btn = document.getElementById('hideZeroBtn');
            if (hideZeroStock) {
                btn.classList.add('active');
                btn.innerHTML = '<span>👁️</span> Покажи нулевите';
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '<span>👁️</span> Скрий нулевите';
            }
            filterProducts();
        }
        
        // ==================== СТАТИСТИКА ====================
        function updateStats() {
            document.getElementById('totalProducts').textContent = allProducts.length;
            document.getElementById('shownProducts').textContent = filteredProducts.length;
            
            const inStock = allProducts.filter(p => p.stock > 0).length;
            document.getElementById('inStockProducts').textContent = inStock;
        }
        
        // ==================== ФУНКЦИЯ ЗА ВИЗУАЛИЗИРАНЕ НА НАЛИЧНОСТ ====================
        function formatStock(stock) {
            if (stock > 9) return '>9';
            if (stock === 0) return '0';
            return stock.toString();
        }
        
        function getStockClass(stock) {
            if (stock === 0) return 'low';
            if (stock <= 3) return 'medium';
            return 'high';
        }
        
        // ==================== РЕНДЕРИРАНЕ ====================
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            
            if (filteredProducts.length === 0) {
                grid.innerHTML = '<div class="no-products">🔍 Няма намерени продукти</div>';
                return;
            }
            
            grid.innerHTML = filteredProducts.map(product => {
                const inCart = cart.find(item => item.id === product.id);
                const currentQuantity = inCart ? inCart.quantity : 0;
                const maxStock = product.stock > 9 ? 999 : product.stock;
                const isOutOfStock = product.stock === 0;
                const isMaxReached = currentQuantity >= maxStock;
                const isSelected = selectedProducts.has(product.id);
                
                return `
                <div class="product-card ${isSelected ? 'selected' : ''} ${isOutOfStock ? 'out-of-stock' : ''}" 
                     onclick="toggleProductSelection(${product.id})">
                    <div class="product-brand">${product.brand}</div>
                    <div class="product-name">${product.model}</div>
                    <div class="product-group">${product.group}</div>
                    <div class="product-stock ${getStockClass(product.stock)}">
                        📦 ${formatStock(product.stock)}
                    </div>
                    <div class="product-footer">
                        <button class="add-btn" 
                                onclick="addToCart(${product.id}); event.stopPropagation();"
                                ${isOutOfStock || isMaxReached ? 'disabled' : ''}>
                            ${isOutOfStock ? '×' : '+'}
                        </button>
                    </div>
                    ${isOutOfStock ? '<div style="color: #c62828; font-size: 12px; margin-top: 5px; text-align: right;">✕ Няма наличност</div>' : ''}
                    ${isMaxReached && !isOutOfStock ? '<div style="color: #ef6c00; font-size: 12px; margin-top: 5px; text-align: right;">⚠ Максимум</div>' : ''}
                </div>
            `}).join('');
            
            updateSelectedCount();
        }
        
        // ==================== ФУНКЦИИ ЗА СЕЛЕКТИРАНЕ ====================
        function toggleProductSelection(productId) {
            if (selectedProducts.has(productId)) {
                selectedProducts.delete(productId);
            } else {
                selectedProducts.add(productId);
            }
            renderProducts();
        }
        
        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = `${selectedProducts.size} избрани`;
        }
        
        // ==================== ФУНКЦИИ ЗА КОЛИЧКА ====================
        function addToCart(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;
            
            if (product.stock === 0) {
                showNotification('❌ Продуктът не е наличен');
                return;
            }
            
            const existingItem = cart.find(item => item.id === productId);
            const currentQuantity = existingItem ? existingItem.quantity : 0;
            const maxStock = product.stock > 9 ? 999 : product.stock;
            
            if (currentQuantity >= maxStock) {
                showNotification(`⚠ Достигнахте максималната наличност (${formatStock(product.stock)})`);
                return;
            }
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({
                    ...product,
                    quantity: 1
                });
            }
            
            updateCartDisplay();
            saveCartToLocalStorage();
            renderProducts();
            showNotification('✅ Продуктът е добавен в количката');
        }
        
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartDisplay();
            saveCartToLocalStorage();
            renderProducts();
        }
        
        function updateQuantity(productId, newQuantity) {
            const item = cart.find(item => item.id === productId);
            if (!item) return;
            
            const product = allProducts.find(p => p.id === productId);
            const maxStock = product.stock > 9 ? 999 : product.stock;
            
            // Валидация
            if (newQuantity < 1) {
                removeFromCart(productId);
                return;
            }
            
            if (newQuantity > maxStock) {
                showNotification(`⚠ Максималната наличност е ${formatStock(product.stock)}`);
                item.quantity = maxStock;
            } else {
                item.quantity = newQuantity;
            }
            
            updateCartDisplay();
            saveCartToLocalStorage();
            renderProducts();
        }
        
        function handleQuantityInput(productId, value) {
            const quantity = parseInt(value);
            if (!isNaN(quantity)) {
                updateQuantity(productId, quantity);
            }
        }
        
        function updateCartDisplay() {
            const cartItems = document.getElementById('cartItems');
            const cartPanelCount = document.getElementById('cartPanelCount');
            const cartTotal = document.getElementById('cartTotal');
            const cartCount = document.getElementById('cartCount');
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<div style="text-align: center; padding: 20px; color: #666;">Количката е празна</div>';
            } else {
                cartItems.innerHTML = cart.map(item => {
                    const product = allProducts.find(p => p.id === item.id);
                    const maxStock = product.stock > 9 ? 999 : product.stock;
                    const isMaxReached = item.quantity >= maxStock;
                    
                    return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h4>${item.brand} - ${item.model}</h4>
                            <p>Код: ${item.code} | Група: ${item.group}</p>
                            ${isMaxReached ? '<div class="stock-warning">⚠ Максимална наличност</div>' : ''}
                        </div>
                        <div class="cart-item-actions">
                            <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                            <input type="number" class="quantity-input" 
                                   value="${item.quantity}" 
                                   min="1" 
                                   max="${maxStock}"
                                   onchange="handleQuantityInput(${item.id}, this.value)"
                                   onkeypress="return (event.charCode >= 48 && event.charCode <= 57)">
                            <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})"
                                    ${isMaxReached ? 'disabled' : ''}>+</button>
                            <button class="remove-btn" onclick="removeFromCart(${item.id})">×</button>
                        </div>
                    </div>
                `}).join('');
            }
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartPanelCount.textContent = `${totalItems} бр.`;
            cartTotal.textContent = `Общо: ${totalItems} бр.`;
            cartCount.textContent = totalItems;
            
            if (document.getElementById('cartModal').classList.contains('active')) {
                showCartModal();
            }
        }
        
        function clearCart() {
            if (confirm('Сигурни ли сте, че искате да изчистите количката?')) {
                cart = [];
                updateCartDisplay();
                saveCartToLocalStorage();
                renderProducts();
            }
        }
        
        // ==================== ФУНКЦИИ ЗА ЗАПАЗВАНЕ ====================
        function saveCartToLocalStorage() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }
        
        function loadCartFromLocalStorage() {
            const savedCart = localStorage.getItem('cart');
            if (savedCart) {
                cart = JSON.parse(savedCart);
                updateCartDisplay();
            }
        }
        
        // ==================== ФУНКЦИИ ЗА ИСТОРИЯ ====================
        function saveOrder() {
            if (cart.length === 0) {
                alert('Количката е празна!');
                return;
            }
            
            const order = {
                id: Date.now(),
                date: new Date().toLocaleString('bg-BG'),
                items: [...cart],
                total: cart.reduce((sum, item) => sum + item.quantity, 0)
            };
            
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));
            
            showNotification('✅ Заявката е запазена в историята');
        }
        
        // ==================== ФУНКЦИИ ЗА МОДАЛНИ ПРОЗОРЦИ ====================
        function showCartModal() {
            const modal = document.getElementById('cartModal');
            const modalCartItems = document.getElementById('modalCartItems');
            const modalCartTotal = document.getElementById('modalCartTotal');
            
            if (cart.length === 0) {
                modalCartItems.innerHTML = '<div style="text-align: center; padding: 20px;">Количката е празна</div>';
            } else {
                modalCartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h4>${item.brand} - ${item.model}</h4>
                            <p>Код: ${item.code} | Група: ${item.group}</p>
                        </div>
                        <div style="font-weight: bold;">Количество: ${item.quantity}</div>
                    </div>
                `).join('');
            }
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            modalCartTotal.textContent = `Общо: ${totalItems} бр.`;
            
            modal.classList.add('active');
        }
        
        function closeCartModal() {
            document.getElementById('cartModal').classList.remove('active');
        }
        
        function showHistoryModal() {
            const modal = document.getElementById('historyModal');
            const historyList = document.getElementById('historyList');
            
            if (orders.length === 0) {
                historyList.innerHTML = '<div style="text-align: center; padding: 20px;">Няма запазени заявки</div>';
            } else {
                historyList.innerHTML = orders.map(order => `
                    <div class="history-item" onclick="loadOrder(${order.id})">
                        <div class="history-date">📅 ${order.date}</div>
                        <div class="history-summary">
                            <span>${order.items.length} артикула</span>
                            <span>${order.total} броя общо</span>
                        </div>
                    </div>
                `).join('');
            }
            
            modal.classList.add('active');
        }
        
        function closeHistoryModal() {
            document.getElementById('historyModal').classList.remove('active');
        }
        
        function loadOrder(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (order) {
                cart = order.items.map(item => ({...item}));
                updateCartDisplay();
                saveCartToLocalStorage();
                renderProducts();
                closeHistoryModal();
                showNotification('✅ Заявката е заредена');
            }
        }
        
        // ==================== ФУНКЦИИ ЗА ЕКСПОРТ ====================
        function printCart() {
            if (cart.length === 0) {
                alert('Количката е празна!');
                return;
            }
            
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                    <head>
                        <title>АВТОЗОНА 33 - Заявка</title>
                        <style>
                            body { font-family: Arial; padding: 20px; }
                            h1 { color: #667eea; }
                            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                            th { background: #667eea; color: white; padding: 10px; }
                            td { padding: 10px; border-bottom: 1px solid #ddd; }
                            .total { font-size: 18px; font-weight: bold; margin-top: 20px; }
                        </style>
                    </head>
                    <body>
                        <h1>АВТОЗОНА 33 - Заявка</h1>
                        <p>Дата: ${new Date().toLocaleString('bg-BG')}</p>
                        <table>
                            <tr>
                                <th>Марка</th>
                                <th>Модел</th>
                                <th>Група</th>
                                <th>Код</th>
                                <th>Количество</th>
                            </tr>
                            ${cart.map(item => `
                                <tr>
                                    <td>${item.brand}</td>
                                    <td>${item.model}</td>
                                    <td>${item.group}</td>
                                    <td>${item.code}</td>
                                    <td>${item.quantity}</td>
                                </tr>
                            `).join('')}
                        </table>
                        <div class="total">
                            Общо артикули: ${cart.reduce((sum, item) => sum + item.quantity, 0)} бр.
                        </div>
                    </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
            
            saveOrder();
        }
        
        function exportCart() {
            if (cart.length === 0) {
                alert('Количката е празна!');
                return;
            }
            
            let csv = 'Марка,Модел,Група,Код,Количество\n';
            
            cart.forEach(item => {
                csv += `"${item.brand}","${item.model}","${item.group}","${item.code}",${item.quantity}\n`;
            });
            
            csv += `,,,Общо,${cart.reduce((sum, item) => sum + item.quantity, 0)}\n`;
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `avtozona33_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }
        
        function emailCart() {
            if (cart.length === 0) {
                alert('Количката е празна!');
                return;
            }
            
            let body = 'Заявка ЗА АВТОЗОНА 33\n\n';
            cart.forEach(item => {
                body += `${item.brand} - ${item.model} (${item.quantity} бр.)\n`;
            });
            body += `\nОбщо: ${cart.reduce((sum, item) => sum + item.quantity, 0)} бр.`;
            
            window.location.href = `mailto:?subject=Заявка от АВТОЗОНА 33&body=${encodeURIComponent(body)}`;
        }
        
        function viberCart() {
            if (cart.length === 0) {
                alert('Количката е празна!');
                return;
            }
            
            let text = 'Заявка от АВТОЗОНА 33:\n\n';
            cart.forEach(item => {
                text += `• ${item.brand} - ${item.model} (${item.quantity} бр.)\n`;
            });
            text += `\nОбщо: ${cart.reduce((sum, item) => sum + item.quantity, 0)} бр.`;
            
            window.open(`viber://forward?text=${encodeURIComponent(text)}`);
        }
        
        // ==================== ПОМОЩНИ ФУНКЦИИ ====================
        function showLoading(show) {
            const spinner = document.getElementById('loadingSpinner');
            const grid = document.getElementById('productsGrid');
            
            if (show) {
                spinner.classList.add('active');
                grid.style.display = 'none';
            } else {
                spinner.classList.remove('active');
                grid.style.display = 'grid';
            }
        }
        
        function updateStatus(message) {
            const badge = document.getElementById('statusBadge');
            badge.innerHTML = message;
            
            if (message.includes('✓')) {
                badge.style.background = '#4CAF50';
            } else if (message.includes('⚠')) {
                badge.style.background = '#ff9800';
            } else {
                badge.style.background = '#667eea';
            }
        }
        
        function showNotification(message) {
            console.log(message);
        }
        
        function toggleLogin() {
            alert('Функцията за вход е в разработка');
        }
        
        // ==================== ЗАРЕЖДАНЕ НА ПРИМЕРНИ ДАННИ ====================
        function loadSampleData() {
            allProducts = [
                { id: 1, brand: 'Bosch', model: 'Нагревател свещи', group: 'Горивна система', stock: 5, code: 'BOS001' },
                { id: 2, brand: 'Bosch', model: 'Сензор ABS', group: 'Спирачна система', stock: 3, code: 'BOS002' },
                { id: 3, brand: 'Valeo', model: 'Съединител', group: 'Трансмисия', stock: 0, code: 'VAL001' },
                { id: 4, brand: 'Valeo', model: 'Алтернатор', group: 'Електрика', stock: 12, code: 'VAL002' },
                { id: 5, brand: 'Hella', model: 'Фар ляв', group: 'Осветление', stock: 8, code: 'HEL001' },
                { id: 6, brand: 'Hella', model: 'Фар десен', group: 'Осветление', stock: 2, code: 'HEL002' },
                { id: 7, brand: 'SKF', model: 'Лагер колело', group: 'Окачване', stock: 15, code: 'SKF001' },
                { id: 8, brand: 'SKF', model: 'Лагер скоростна кутия', group: 'Трансмисия', stock: 4, code: 'SKF002' },
                { id: 9, brand: 'Bosch', model: 'Стартер', group: 'Електрика', stock: 7, code: 'BOS003' },
                { id: 10, brand: 'Valeo', model: 'Чистачки', group: 'Аксесоари', stock: 20, code: 'VAL003' }
            ];
            
            initializeFilters();
            filterProducts();
            updateStats();
            updateStatus('⚠ Демо данни (няма връзка)');
            showLoading(false);
        }
        
        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        document.addEventListener('DOMContentLoaded', function() {
            loadCartFromLocalStorage();
            loadProductsFromGoogleSheets();
            
            window.onclick = function(event) {
                const cartModal = document.getElementById('cartModal');
                const historyModal = document.getElementById('historyModal');
                
                if (event.target === cartModal) {
                    closeCartModal();
                }
                if (event.target === historyModal) {
                    closeHistoryModal();
                    
}
                }
            };
        });
    </script>
</body>
