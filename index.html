<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АВТОЗОНА 33</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a365d">
    <meta name="mobile-web-app-capable" content="yes"> 
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(() => console.log('PWA Ready'));
            });
        }
    </script>

    <style>
        :root { --p: #1a365d; --s: #2b6cb0; --ok: #48bb78; --err: #c53030; --bg: #f7fafc; --card: #ffffff; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); padding-bottom: 80px; }
        #loginOverlay { position: fixed; inset: 0; background: var(--p); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 350px; }
        .login-box input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid var(--border); border-radius: 10px; text-align: center; }
        .login-box button { background: var(--s); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        .header { background: var(--p); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        #uploadZone { text-align: center; padding: 40px; border: 2px dashed #ccc; margin: 20px; background: white; border-radius: 15px; cursor: pointer; }
        .controls { background: white; padding: 10px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        #searchInput { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid var(--s); outline: none; }
        .product-card { background: white; margin: 10px; padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        .p-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .order-controls { display: flex; align-items: center; gap: 10px; background: #f0f4f8; padding: 5px; border-radius: 20px; }
        .btn-qty { background: var(--s); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }
        .qty-input { width: 40px; border: none; background: transparent; text-align: center; font-weight: bold; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--p); color: white; padding: 15px; text-align: center; cursor: pointer; z-index: 200; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>АВТОЗОНА 33</h2>
        <input type="password" id="passInput" placeholder="Код за достъп">
        <button onclick="checkPass()">ВЛИЗАНЕ</button>
    </div>
</div>

<div id="mainApp" style="display: none;">
    <div class="header"><h1>АВТОЗОНА 33</h1></div>

    <div id="uploadZone" onclick="document.getElementById('fileIn').click()">
        <p>📁 НАТИСНИ ТУК, ЗА ДА ЗАРЕДИШ EXCEL</p>
        <input type="file" id="fileIn" hidden onchange="handleFile(event)">
    </div>

    <div class="controls" id="searchUI" style="display:none;">
        <input type="search" id="searchInput" placeholder="Търсене на модел или код..." oninput="handleSearch()">
    </div>

    <div id="list"></div>

    <div class="cart-bar" id="cartBar" style="display:none;" onclick="alert('Заявката е копирана! Използвай Viber.'); copyViber();">
        📋 КОПИРАЙ ЗАЯВКАТА (<span id="cartCount">0</span> бр.)
    </div>
</div>

<script>
    let db = [];
    let cart = new Map();

    function checkPass() {
        if(document.getElementById('passInput').value.toUpperCase() === "AZ33") {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            const saved = localStorage.getItem('az_db');
            if(saved) { 
                db = JSON.parse(saved); 
                document.getElementById('uploadZone').style.display = 'none';
                document.getElementById('searchUI').style.display = 'block';
                handleSearch(); 
            }
        } else { alert("Грешен код!"); }
    }

    function handleFile(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (evt) => {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
            
            // Намиране на колоните (Стока, Код, Склад)
            let hIdx = rows.findIndex(r => r && r.some(c => String(c).toLowerCase().includes('стока')));
            const h = rows[hIdx].map(c => String(c || '').toLowerCase().trim());
            const colIdx = (keys) => h.findIndex(x => keys.some(y => x.includes(y)));

            db = rows.slice(hIdx + 1).filter(r => r[colIdx(['стока'])]).map((r, i) => ({
                id: 'id' + i,
                c: String(r[colIdx(['код'])] || ''),
                n: String(r[colIdx(['стока'])] || ''),
                w: parseFloat(String(r[colIdx(['склад'])] || 0).replace(',','.')) || 0
            }));

            localStorage.setItem('az_db', JSON.stringify(db));
            alert("Файлът е зареден успешно!");
            location.reload();
        };
        reader.readAsArrayBuffer(file);
    }

    function handleSearch() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = db.filter(i => i.n.toLowerCase().includes(q) || i.c.toLowerCase().includes(q));
        render(filtered);
    }

    function render(data) {
        document.getElementById('list').innerHTML = data.slice(0, 50).map(i => {
            const qty = cart.get(i.id) || 0;
            return `
            <div class="product-card">
                <div class="p-header">
                    <span style="font-weight:bold; color:#2c5282;">${i.c}</span>
                    <div class="order-controls">
                        <button class="btn-qty" onclick="updateQty('${i.id}', ${qty - 1})">-</button>
                        <span class="qty-input">${qty}</span>
                        <button class="btn-qty" onclick="updateQty('${i.id}', ${qty + 1})">+</button>
                    </div>
                </div>
                <div style="font-weight:bold;">${i.n}</div>
                <div style="font-size:0.8rem; color:gray;">Налично: ${i.w} бр.</div>
            </div>`;
        }).join('');
    }

    function updateQty(id, val) {
        const item = db.find(i => i.id === id);
        if (val < 0) val = 0;
        if (val > item.w) val = Math.floor(item.w);
        if (val === 0) cart.delete(id); else cart.set(id, val);
        
        let total = 0; cart.forEach(v => total += v);
        document.getElementById('cartBar').style.display = total > 0 ? 'block' : 'none';
        document.getElementById('cartCount').innerText = total;
        handleSearch();
    }

    function copyViber() {
        let txt = "ЗАЯВКА АВТОЗОНА 33:\n";
        cart.forEach((q, id) => {
            const i = db.find(it => it.id === id);
            txt += `• ${i.n} [${i.c}] - ${q}бр.\n`;
        });
        navigator.clipboard.writeText(txt);
    }
</script>
</body>
</html>
