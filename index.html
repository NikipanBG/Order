<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АВТОЗОНА 33</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a365d">
    <meta name="mobile-web-app-capable" content="yes"> 
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(() => console.log('PWA Ready'));
            });
        }
    </script>

    <style>
        :root { --p: #1a365d; --s: #2b6cb0; --ok: #48bb78; --err: #c53030; --bg: #f7fafc; --card: #ffffff; --border: #e2e8f0; --warn: #ed8936; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); padding-bottom: 80px; }
        #loginOverlay { position: fixed; inset: 0; background: var(--p); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 350px; }
        .login-box input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid var(--border); border-radius: 10px; text-align: center; font-size: 1.2rem; }
        .login-box button { background: var(--s); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        .header { background: var(--p); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        #uploadZone { text-align: center; padding: 40px; border: 2px dashed #ccc; margin: 20px; background: white; border-radius: 15px; cursor: pointer; }
        .controls { background: white; padding: 10px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        .search-row { display: flex; gap: 8px; }
        #searchInput { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid var(--s); outline: none; font-size: 16px; }
        .filter-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        select { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: white; font-size: 0.85rem; }
        .product-card { background: white; margin: 8px; padding: 12px; border-radius: 10px; border: 1px solid var(--border); position: relative; }
        .product-card.low-stock { border-left: 4px solid var(--warn); }
        .p-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .p-code { font-weight: bold; background: #ebf8ff; color: #2c5282; padding: 3px 8px; border-radius: 5px; font-size: 0.8rem; }
        .order-controls { display: flex; align-items: center; gap: 5px; background: #edf2f7; padding: 4px; border-radius: 20px; }
        .btn-qty { background: var(--s); color: white; border: none; width: 34px; height: 34px; border-radius: 50%; font-size: 1.4rem; cursor: pointer; }
        .qty-input { width: 40px; border: none; background: transparent; text-align: center; font-weight: bold; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--p); color: white; padding: 18px; text-align: center; font-weight: bold; cursor: pointer; z-index: 200; }
        .btn-tool { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: white; cursor: pointer; }
        .btn-tool.active { background: var(--ok); color: white; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>АВТОЗОНА 33</h2>
        <input type="password" id="passInput" placeholder="Код за достъп">
        <button onclick="checkPass()">ВЛИЗАНЕ</button>
    </div>
</div>

<div id="mainApp" style="display: none;">
    <div class="header">
        <div style="width:50px"></div>
        <h1>АВТОЗОНА 33</h1>
        <button onclick="clearData()" style="background:none; border:1px solid white; color:white; padding:4px 8px; border-radius:5px; font-size:0.6rem;">ОБНОВИ</button>
    </div>

    <div id="uploadZone" onclick="document.getElementById('fileIn').click()">
        <p>📁 НАТИСНИ ТУК ЗА EXCEL ФАЙЛ</p>
        <input type="file" id="fileIn" hidden onchange="handleFile(event)">
    </div>

    <div class="controls" id="ui-main" style="display:none;">
        <div class="search-row">
            <input type="search" id="searchInput" placeholder="Търсене..." oninput="handleSearch()">
            <button class="btn-tool" id="stockBtn" onclick="toggleStock()">📦</button>
        </div>
        <div class="filter-row">
            <select id="sgFilter" onchange="updateF(); handleSearch()"><option value="">Група (Всички)</option></select>
            <select id="brFilter" onchange="handleSearch()"><option value="">Марка (Всички)</option></select>
        </div>
    </div>

    <div id="list"></div>

    <div class="cart-bar" id="cartBar" style="display:none;" onclick="copyViber()">
        📋 КОПИРАЙ ЗАЯВКАТА (<span id="cartCount">0</span> бр.)
    </div>
</div>

<script>
    let db = [];
    let cart = new Map();
    let stockOnly = false;

    function checkPass() {
        if(document.getElementById('passInput').value.toUpperCase() === "AZ33") {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadData();
        } else { alert("Грешен код!"); }
    }

    function loadData() {
        const saved = localStorage.getItem('az_db_final');
        if(saved) {
            db = JSON.parse(saved);
            document.getElementById('uploadZone').style.display = 'none';
            document.getElementById('ui-main').style.display = 'flex';
            initF();
            handleSearch();
        }
    }

    function handleFile(e) {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const data = new Uint8Array(evt.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            
            let hIdx = rows.findIndex(r => r && r.some(c => String(c).toLowerCase().includes('стока')));
            const h = rows[hIdx].map(c => String(c || '').toLowerCase().trim());
            const col = (keys) => h.findIndex(x => keys.some(y => x.includes(y)));

            db = rows.slice(hIdx + 1).filter(r => r[col(['стока'])]).map((r, i) => {
                const g = String(r[col(['група'])] || '').split('/');
                return {
                    id: 'az' + i,
                    c: String(r[col(['код'])] || ''),
                    n: String(r[col(['стока'])] || ''),
                    sg: g[1] || 'Общи',
                    br: g[2] || 'Други',
                    w: parseFloat(String(r[col(['склад'])] || 0).replace(',','.')) || 0
                };
            });

            localStorage.setItem('az_db_final', JSON.stringify(db));
            location.reload();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    }

    function initF() {
        const sgs = [...new Set(db.map(i => i.sg))].sort();
        document.getElementById('sgFilter').innerHTML = '<option value="">Група (Всички)</option>' + sgs.map(g => `<option value="${g}">${g}</option>`).join('');
        updateF();
    }

    function updateF() {
        const sel = document.getElementById('sgFilter').value;
        const brs = [...new Set(db.filter(i => !sel || i.sg === sel).map(i => i.br))].sort();
        document.getElementById('brFilter').innerHTML = '<option value="">Марка (Всички)</option>' + brs.map(b => `<option value="${b}">${b}</option>`).join('');
    }

    function handleSearch() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const sg = document.getElementById('sgFilter').value;
        const br = document.getElementById('brFilter').value;
        
        let fil = db.filter(i => 
            (!sg || i.sg === sg) && 
            (!br || i.br === br) && 
            (i.n.toLowerCase().includes(q) || i.c.toLowerCase().includes(q))
        );
        
        if(stockOnly) fil = fil.filter(i => i.w > 0);
        render(fil);
    }

    function render(data) {
        document.getElementById('list').innerHTML = data.slice(0, 100).map(i => {
            const qty = cart.get(i.id) || 0;
            return `
            <div class="product-card ${i.w > 0 && i.w <= 5 ? 'low-stock' : ''}">
                <div class="p-header">
                    <span class="p-code">${i.c}</span>
                    <div class="order-controls">
                        <button class="btn-qty" onclick="updateQty('${i.id}', ${qty - 1})">-</button>
                        <span class="qty-input">${qty}</span>
                        <button class="btn-qty" onclick="updateQty('${i.id}', ${qty + 1})">+</button>
                    </div>
                </div>
                <div style="font-weight:bold; color:var(--p);">${i.n}</div>
                <div style="font-size:0.75rem; color:gray; margin-top:4px;">Склад: ${i.w} бр.</div>
            </div>`;
        }).join('');
    }

    function updateQty(id, val) {
        const item = db.find(i => i.id === id);
        if (val < 0) val = 0;
        if (val > item.w) val = Math.floor(item.w);
        if (val === 0) cart.delete(id); else cart.set(id, val);
        
        let t = 0; cart.forEach(v => t += v);
        document.getElementById('cartBar').style.display = t > 0 ? 'block' : 'none';
        document.getElementById('cartCount').innerText = t;
        handleSearch();
    }

    function toggleStock() { 
        stockOnly = !stockOnly; 
        document.getElementById('stockBtn').classList.toggle('active'); 
        handleSearch(); 
    }

    function copyViber() {
        let txt = "ЗАЯВКА АВТОЗОНА 33:\n";
        cart.forEach((q, id) => {
            const i = db.find(it => it.id === id);
            txt += `• ${i.n} [${i.c}] - ${q}бр.\n`;
        });
        navigator.clipboard.writeText(txt).then(() => alert("Заявката е копирана! Постави я във Viber."));
    }

    function clearData() { if(confirm("Изчистване на всички данни?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
