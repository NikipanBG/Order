<!-- ============================================
     ТЪРСАЧКА ЗА АКУМУЛАТОРИ - АВТОЗОНА 33
     ============================================ -->

<!-- Специализирана търсачка за акумулатори -->
<div class="battery-search-container">
  <div class="search-header">
    <h3>🔋 Търсачка на акумулатори</h3>
  </div>
  
  <div class="search-filters">
    <div class="filter-row">
      <!-- Търсене по име/марка -->
      <div class="filter-group">
        <input 
          type="text" 
          id="batterySearchInput" 
          class="search-input"
          placeholder="Търси по марка или модел..."
        >
      </div>
      
      <!-- Филтър по капацитет (Ah) -->
      <div class="filter-group">
        <select id="ahFilter" class="filter-select">
          <option value="">Капацитет (Ah)</option>
          <option value="44">44 Ah</option>
          <option value="55">55 Ah</option>
          <option value="60">60 Ah</option>
          <option value="62">62 Ah</option>
          <option value="70">70 Ah</option>
          <option value="74">74 Ah</option>
          <option value="80">80 Ah</option>
          <option value="90">90 Ah</option>
          <option value="100">100 Ah</option>
          <option value="110">110 Ah</option>
        </select>
      </div>
      
      <!-- Филтър по студен старт (A) -->
      <div class="filter-group">
        <select id="ccaFilter" class="filter-select">
          <option value="">Студен старт (A)</option>
          <option value="400">400 A</option>
          <option value="450">450 A</option>
          <option value="500">500 A</option>
          <option value="550">550 A</option>
          <option value="600">600 A</option>
          <option value="680">680 A</option>
          <option value="720">720 A</option>
          <option value="800">800 A</option>
        </select>
      </div>
    </div>
    
    <div class="filter-row">
      <!-- Филтър по полярност -->
      <div class="filter-group">
        <select id="polarityFilter" class="filter-select">
          <option value="">Полярност</option>
          <option value="D">Дясна (D)</option>
          <option value="L">Лява (L)</option>
        </select>
      </div>
      
      <!-- Филтър по напрежение -->
      <div class="filter-group">
        <select id="voltageFilter" class="filter-select">
          <option value="">Напрежение</option>
          <option value="12">12V</option>
        </select>
      </div>
      
      <!-- Бутон за търсене -->
      <button id="searchBtn" class="search-button">
        🔍 Търси
      </button>
      
      <!-- Бутон за нулиране -->
      <button id="resetBtn" class="reset-button">
        ↺ Изчисти
      </button>
    </div>
  </div>
  
  <!-- Резултати -->
  <div id="batteryResults" class="battery-results" style="display: none;">
    <div class="results-summary">
      <span id="resultsCount">0</span> намерени акумулатора
    </div>
    <div id="resultsGrid" class="results-grid">
      <!-- Резултатите ще се покажат тук -->
    </div>
  </div>
</div>

<!-- CSS и JS файлове -->
<link rel="stylesheet" href="battery-search.css">
<script src="battery-search.js"></script>
